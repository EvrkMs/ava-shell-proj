version: "3.8"

services:
  auth:
    build:
      context: .
      dockerfile: Auth.Host/Dockerfile
      args:
        # Optional: override the default self-signed cert password used in image
        - KESTREL_CERT_PASSWORD=${KESTREL_CERT_PASSWORD:-changeit}
    image: auth-host:latest
    container_name: auth-host
    restart: always
    environment:
      # ASP.NET Core
      - ASPNETCORE_ENVIRONMENT=Production

      # Connection strings (double underscore for nesting)
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=authdb_auth;Username=AdminAVA;Password=${POSTGRES_PASSWORD}

      # Telegram
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__AllowedClockSkewSeconds=60

      # OpenIddict seeding secrets (optional but recommended to set)
      - OIDC_SVC_REPORTING_SECRET=${OIDC_SVC_REPORTING_SECRET}
      - OIDC_SVC_INTROSPECTOR_SECRET=${OIDC_SVC_INTROSPECTOR_SECRET}
      - OIDC_RESOURCE_SECRET=${OIDC_RESOURCE_SECRET}

      # Optional bootstrap superuser (seed only if provided)
      - AUTH_ROOT_PASSWORD=${AUTH_ROOT_PASSWORD}

    # No host ports published — service is only reachable inside the network
    expose:
      - "5001"

    networks:
      - app-network

networks:
  app-network:
    external: true
    name: 
      - app-network
      - nginx_nginx_network

