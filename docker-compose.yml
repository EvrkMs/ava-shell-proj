п»ҝservices:
  auth:
    build:
      context: .
      dockerfile: Auth.Host/Dockerfile
    image: auth-host:latest
    container_name: auth-host
    hostname: auth-host
    restart: always
    environment:
      - ForwardedHeaders__KnownNetworks=${ForwardedHeaders__KnownNetworks}
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=auth_db;Username=AdminAVA;Password=${POSTGRES_PASSWORD}
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__AllowedClockSkewSeconds=60
      - OIDC_SVC_REPORTING_SECRET=${OIDC_SVC_REPORTING_SECRET}
      - OIDC_SVC_INTROSPECTOR_SECRET=${OIDC_SVC_INTROSPECTOR_SECRET}
      - OIDC_RESOURCE_SECRET=${OIDC_RESOURCE_SECRET}
      - AUTH_ROOT_PASSWORD=${AUTH_ROOT_PASSWORD}
    expose:
      - "5001"                     # Р Р…Р Вө Р С•Р ВұРЎРҸР В·Р В°РЎвҖҡР ВөР В»РЎРҠР Р…Р С•, Р Р…Р С• Р С”Р В°Р С” РЎРғР В°Р СҳР С•Р Т‘Р С•Р С”РЎС“Р СҳР ВөР Р…РЎвҖҡР В°РЎвҖ Р С‘РЎРҸ Р С•Р С”
    networks:
      - app-network                # Р РҶР Р…РЎС“РЎвҖҡРЎРӮР ВөР Р…Р Р…РЎРҸРЎРҸ РЎРғР ВөРЎвҖҡРЎРҠ Р С—РЎРӮР С‘Р В»Р С•Р В¶Р ВөР Р…Р С‘Р в„–
      - nginx_network              # РЎРғР ВөРЎвҖҡРЎРҠ, Р С–Р Т‘Р Вө РЎРғР С‘Р Т‘Р С‘РЎвҖҡ nginx (РЎвҖЎРЎвҖҡР С•Р ВұРЎвҖ№ Р С•Р Р… Р РҶР С‘Р Т‘Р ВөР В» auth)

networks:
  app-network:
    external: true
    name: app-network              # РЎРғРЎС“РЎвҖ°Р ВөРЎРғРЎвҖҡР РҶРЎС“РЎРӢРЎвҖ°Р В°РЎРҸ user-defined РЎРғР ВөРЎвҖҡРЎРҠ

  nginx_network:
    external: true
    name: nginx_network      # РЎвҖһР В°Р С”РЎвҖҡР С‘РЎвҖЎР ВөРЎРғР С”Р С•Р Вө Р С‘Р СҳРЎРҸ РЎРғР ВөРЎвҖҡР С‘ Р С‘Р В· РЎРғРЎвҖҡР ВөР С”Р В° nginx

volumes:
  auth_dataprotection:
