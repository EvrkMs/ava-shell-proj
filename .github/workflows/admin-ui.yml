name: Admin UI - Build & Deploy

on:
  push:
    branches: [ "master" ]
    paths:
      - "UI/**"
      - ".github/workflows/admin-ui.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "UI/**"
      - ".github/workflows/admin-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test:
    name: Build, Test & Package
    runs-on: [self-hosted]
    outputs:
      image-owner: ${{ steps.normalize.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: normalize
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Build runtime image (loads into local Docker)
        uses: docker/build-push-action@v6
        with:
          context: UI/react-admin-spa
          file: UI/react-admin-spa/Dockerfile
          tags: |
            admin-ui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Run smoke test
        run: |
          docker rm -f admin-ui-smoke >/dev/null 2>&1 || true
          docker run -d --rm --name admin-ui-smoke -p 5080:5000 admin-ui:${{ github.sha }}
          for i in $(seq 1 15); do
            if curl -kfsS https://localhost:5080/ui-healthz >/dev/null; then
              ok=1
              break
            fi
            sleep 1
          done
          docker rm -f admin-ui-smoke >/dev/null 2>&1 || true
          if [ "${ok:-0}" -ne 1 ]; then
            echo "Smoke test failed"
            exit 1
          fi

      - name: Extract build artifacts
        run: |
          rm -rf UI/react-admin-spa/dist
          docker create --name admin-ui-artifact admin-ui:${{ github.sha }} >/dev/null
          docker cp admin-ui-artifact:/usr/share/nginx/html UI/react-admin-spa/dist
          docker rm admin-ui-artifact >/dev/null

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-ui-dist
          path: UI/react-admin-spa/dist
          if-no-files-found: error

      - name: Login to GHCR (push stage)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag & push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          docker tag admin-ui:${{ github.sha }} ghcr.io/${{ steps.normalize.outputs.owner }}/admin-ui:${{ github.sha }}
          docker tag admin-ui:${{ github.sha }} ghcr.io/${{ steps.normalize.outputs.owner }}/admin-ui:master
          docker push ghcr.io/${{ steps.normalize.outputs.owner }}/admin-ui:${{ github.sha }}
          docker push ghcr.io/${{ steps.normalize.outputs.owner }}/admin-ui:master

  deploy:
    name: Deploy
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull freshly built image
        run: docker pull ghcr.io/${{ needs.build-test.outputs.image-owner }}/admin-ui:${{ github.sha }}

      - name: Deploy via docker compose
        env:
          UI_IMAGE: ghcr.io/${{ needs.build-test.outputs.image-owner }}/admin-ui:${{ github.sha }}
        run: |
          docker compose -f UI/docker-compose.yml up -d --no-build admin-ui
