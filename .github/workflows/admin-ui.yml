name: Admin UI - Build & Deploy

on:
  push:
    branches: [ "master" ]
    paths:
      - "UI/**"
      - ".github/workflows/admin-ui.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "UI/**"
      - ".github/workflows/admin-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Lint & Build (Docker)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image (runs lint & build inside)
        run: docker build --target test -t admin-ui-test:${{ github.sha }} UI/react-admin-spa

      - name: Extract build artifacts
        run: |
          rm -rf UI/react-admin-spa/dist
          docker create --name admin-ui-test-container admin-ui-test:${{ github.sha }} >/dev/null
          docker cp admin-ui-test-container:/app/dist UI/react-admin-spa/dist
          docker rm admin-ui-test-container >/dev/null

      - name: Remove test image
        if: always()
        run: docker image rm admin-ui-test:${{ github.sha }} || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-ui-dist
          path: UI/react-admin-spa/dist
          if-no-files-found: error

  build-image:
    name: Build Docker Image
    needs: build
    runs-on: [self-hosted]
    outputs:
      image-owner: ${{ steps.normalize.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image owner
        id: normalize
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: UI/react-admin-spa
          file: UI/react-admin-spa/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ steps.normalize.outputs.owner }}/admin-ui:${{ github.sha }}
            ghcr.io/${{ steps.normalize.outputs.owner }}/admin-ui:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull freshly built image
        run: docker pull ghcr.io/${{ needs.build-image.outputs.image-owner }}/admin-ui:${{ github.sha }}

      - name: Deploy via docker compose
        env:
          UI_IMAGE: ghcr.io/${{ needs.build-image.outputs.image-owner }}/admin-ui:${{ github.sha }}
        run: |
          docker compose -f UI/docker-compose.yml up -d --no-build admin-ui
