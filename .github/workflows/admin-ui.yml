name: Admin UI - Build & Deploy

on:
  push:
    branches: [ "master" ]
    paths:
      - "UI/**"
      - ".github/workflows/admin-ui.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "UI/**"
      - ".github/workflows/admin-ui.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Install, Lint & Build
    runs-on: [self-hosted, ava-vm]
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'
          cache-dependency-path: UI/react-admin-spa/package-lock.json

      - name: Install dependencies
        working-directory: UI/react-admin-spa
        run: npm ci --no-audit --no-fund

      - name: Lint
        working-directory: UI/react-admin-spa
        run: npm run lint

      - name: Build
        working-directory: UI/react-admin-spa
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-ui-dist
          path: UI/react-admin-spa/dist
          if-no-files-found: error

  build-image:
    name: Build Docker Image
    needs: build
    runs-on: [self-hosted, ava-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: UI/react-admin-spa
          file: UI/react-admin-spa/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ui:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ui:master
          cache-from: type=gha
          cache-to: type=gha,mode=max
