name: Build & Test (UI + ComputerAdminAuth)

on:
  push:
    branches: [ "master" ]
    paths:
      - 'UI/**'
      - 'ComputerAdminAuth/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'UI/**'
      - 'ComputerAdminAuth/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  # Определяем, что изменилось
  changes:
    runs-on: [self-hosted, AVA-VM]
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui:
              - 'UI/**'
            admin:
              - 'ComputerAdminAuth/**'

  # ---------- ТЕСТЫ ДЛЯ ASP.NET (ComputerAdminAuth) ----------
  test_admin:
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: [self-hosted, AVA-VM]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Если есть .sln в корне ComputerAdminAuth — можно явно указать путь к ней.
      # Иначе dotnet нормально отработает по проектам в папке.
      - name: Restore
        working-directory: ./ComputerAdminAuth
        run: dotnet restore

      - name: Build (Release)
        working-directory: ./ComputerAdminAuth
        run: dotnet build --configuration Release --no-restore

      # Генерация TRX + покрытие (cobertura) через coverlet.collector
      - name: Test (+coverage)
        working-directory: ./ComputerAdminAuth
        run: >
          dotnet test
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test_results.trx"
          --collect:"XPlat Code Coverage"
          -p:CollectCoverage=true
          -p:CoverletOutputFormat=cobertura
          -p:CoverletOutput=TestResults/Coverage/

      # (опционально) HTML-отчёт покрытия: удобен в summary и как артефакт
      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report (HTML)
        run: |
          mkdir -p coverage-report
          reportgenerator \
            -reports:"ComputerAdminAuth/**/TestResults/Coverage/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:HtmlSummary
        env:
          PATH: $HOME/.dotnet/tools:$PATH

      # Загрузим результаты как артефакты, чтобы посмотреть/скачать из UI GitHub
      - name: Upload test results (TRX)
        uses: actions/upload-artifact@v4
        with:
          name: admin-test-results
          path: |
            ComputerAdminAuth/**/TestResults/*.trx
          if-no-files-found: warn

      - name: Upload coverage (XML+HTML)
        uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: |
            ComputerAdminAuth/**/TestResults/Coverage/coverage.cobertura.xml
            coverage-report/**
          if-no-files-found: warn

  # ---------- СБОРКА UI ----------
  build_ui:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: [self-hosted, AVA-VM]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push) UI image
        uses: docker/build-push-action@v6
        with:
          context: ./UI/react-admin-spa
          file: ./UI/react-admin-spa/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ui:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ui:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- СБОРКА ASP.NET (после тестов) ----------
  build_admin:
    # важный момент: ждём и определения изменений, и (если были изменения) прохождения тестов
    needs: [changes, test_admin]
    if: needs.changes.outputs.admin == 'true'
    runs-on: [self-hosted, AVA-VM]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push) Admin image
        uses: docker/build-push-action@v6
        with:
          context: ./ComputerAdminAuth/Auth.Host
          file: ./ComputerAdminAuth/Auth.Host/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/computer-admin-auth:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/computer-admin-auth:master
          cache-from: type=gha
          cache-to: type=gha,mode=max
