name: ComputerAdminAuth - Build & Deploy

on:
  push:
    branches: [ "master" ]
    paths:
      - "ComputerAdminAuth/**"
      - ".github/workflows/computeradminauth.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "ComputerAdminAuth/**"
      - ".github/workflows/computeradminauth.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test & Coverage
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image (runs dotnet test inside)
        run: docker build --target test -t computeradminauth-test:${{ github.sha }} -f ComputerAdminAuth/Auth.Host/Dockerfile ComputerAdminAuth

      - name: Ensure auth secret file exists for tests
        run: |
          AUTH_ENV_PATH="${HOME}/.config/ava/auth-host.env"
          if [ ! -f "$AUTH_ENV_PATH" ]; then
            echo "::error::Missing required secret file $AUTH_ENV_PATH on test host." >&2
            exit 1
          fi
          chmod 600 "$AUTH_ENV_PATH"
          echo "AUTH_ENV_PATH=$AUTH_ENV_PATH" >> "$GITHUB_ENV"

      - name: Database connectivity smoke test (data-network)
        env:
          AUTH_ENV_PATH: ${{ env.AUTH_ENV_PATH }}
        run: |
          docker run --rm \
            --user $(id -u):$(id -g) \
            --network data-network \
            --env-file "$AUTH_ENV_PATH" \
            -e SKIP_DB_TESTS=false \
            -e DOTNET_CLI_TELEMETRY_OPTOUT=1 \
            -e DOTNET_SKIP_FIRST_TIME_EXPERIENCE=1 \
            -e DOTNET_CLI_HOME=/tmp/dotnet_cli_home \
            -v /tmp/dotnet_cli_home:/tmp/dotnet_cli_home \
            -v "$PWD/ComputerAdminAuth":/src \
            -w /src \
            --entrypoint sh \
            mcr.microsoft.com/dotnet/sdk:9.0 \
            -c "mkdir -p /tmp/dotnet_cli_home && dotnet test Auth.Tests/Auth.Tests.csproj --configuration Release --no-restore --filter 'Category=DatabaseConnectivity'"

      - name: Extract test artifacts
        run: |
          rm -rf ComputerAdminAuth/TestResults
          docker create --name computeradminauth-test-container computeradminauth-test:${{ github.sha }} >/dev/null
          docker cp computeradminauth-test-container:/src/TestResults ComputerAdminAuth/TestResults || true
          docker rm computeradminauth-test-container >/dev/null

      - name: Remove test image
        if: always()
        run: docker image rm computeradminauth-test:${{ github.sha }} || true

      - name: Upload test results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: admin-test-results
          path: |
            ComputerAdminAuth/TestResults/*.trx
            ComputerAdminAuth/TestResults/Coverage/coverage.cobertura.xml
          if-no-files-found: warn

  build-image:
    name: Build Docker Image
    needs: test
    runs-on: [self-hosted]
    outputs:
      image-owner: ${{ steps.normalize.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image owner
        id: normalize
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: ComputerAdminAuth
          file: ComputerAdminAuth/Auth.Host/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ steps.normalize.outputs.owner }}/computer-admin-auth:${{ github.sha }}
            ghcr.io/${{ steps.normalize.outputs.owner }}/computer-admin-auth:master
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull freshly built image
        run: docker pull ghcr.io/${{ needs.build-image.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}

      - name: Ensure auth secret file exists
        run: |
          AUTH_ENV_PATH="${HOME}/.config/ava/auth-host.env"
          mkdir -p "$(dirname "$AUTH_ENV_PATH")"
          if [ ! -f "$AUTH_ENV_PATH" ]; then
            echo "::error::Missing required secret file $AUTH_ENV_PATH on deploy host." >&2
            exit 1
          fi
          chmod 600 "$AUTH_ENV_PATH"
          echo "AUTH_ENV_PATH=$AUTH_ENV_PATH" >> "$GITHUB_ENV"

      - name: Verify database connectivity
        env:
          AUTH_ENV_PATH: ${{ env.AUTH_ENV_PATH }}
        run: |
          CONNECTION=$(grep '^ConnectionStrings__DefaultConnection=' "$AUTH_ENV_PATH" | cut -d= -f2-)
          if [ -z "$CONNECTION" ]; then
            echo "::error::ConnectionStrings__DefaultConnection is not set in $AUTH_ENV_PATH" >&2
            exit 1
          fi
          kv() {
            echo "$CONNECTION" | tr ';' '\n' | awk -F= -v key="$1" 'tolower($1)==tolower(key){print substr($0,index($0,"=")+1)}'
          }
          HOST=$(kv Host)
          PORT=$(kv Port)
          DB=$(kv Database)
          USER=$(kv Username)
          PASS=$(kv Password)
          SSL=$(kv Sslmode)
          if [ -z "$HOST" ] || [ -z "$DB" ] || [ -z "$USER" ] || [ -z "$PASS" ]; then
            echo "::error::Connection string must include Host, Database, Username and Password values." >&2
            exit 1
          fi
          PORT=${PORT:-5432}
          echo "Testing connectivity to $HOST:$PORT/$DB as $USER"
          docker pull -q postgres:16-alpine
          docker run --rm --network host \
            -e PGPASSWORD="$PASS" \
            ${SSL:+-e PGSSLMODE=$SSL} \
            postgres:16-alpine \
            sh -c "psql -h \"$HOST\" -p \"$PORT\" -U \"$USER\" -d \"$DB\" -c 'select 1'" >/dev/null
          echo "Database connectivity OK."

      - name: Deploy via docker compose
        env:
          AUTH_IMAGE: ghcr.io/${{ needs.build-image.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}
          AUTH_ENV_FILE: ${{ env.AUTH_ENV_PATH }}
        run: |
          docker compose -f ComputerAdminAuth/docker-compose.yml up -d --no-build auth
