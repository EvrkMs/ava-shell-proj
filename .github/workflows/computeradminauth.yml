name: ComputerAdminAuth - Build & Deploy

on:
  push:
    branches: [ "master" ]
    paths:
      - "ComputerAdminAuth/**"
      - ".github/workflows/computeradminauth.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "ComputerAdminAuth/**"
      - ".github/workflows/computeradminauth.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test & Coverage
    runs-on: [self-hosted, Linux, X64]
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('ComputerAdminAuth/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        working-directory: ComputerAdminAuth
        run: dotnet restore

      - name: Build (Release)
        working-directory: ComputerAdminAuth
        run: dotnet build --configuration Release --no-restore

      - name: Test (+coverage)
        working-directory: ComputerAdminAuth
        run: >
          dotnet test
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test_results.trx"
          --collect:"XPlat Code Coverage"
          -p:CollectCoverage=true
          -p:CoverletOutputFormat=cobertura
          -p:CoverletOutput=TestResults/Coverage/

      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report (HTML)
        run: |
          mkdir -p coverage-report
          reportgenerator \
            -reports:"ComputerAdminAuth/**/TestResults/Coverage/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:HtmlSummary
        env:
          PATH: $HOME/.dotnet/tools:$PATH

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: admin-test-results
          path: ComputerAdminAuth/**/TestResults/*.trx
          if-no-files-found: warn

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: admin-coverage
          path: |
            ComputerAdminAuth/**/TestResults/Coverage/coverage.cobertura.xml
            coverage-report/**
          if-no-files-found: warn

  build-image:
    name: Build Docker Image
    needs: test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and optionally push) image
        uses: docker/build-push-action@v6
        with:
          context: ComputerAdminAuth
          file: ComputerAdminAuth/Auth.Host/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/computer-admin-auth:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/computer-admin-auth:master
          cache-from: type=gha
          cache-to: type=gha,mode=max
