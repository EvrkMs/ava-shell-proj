name: ComputerAdminAuth - Build & Deploy

on:
  push:
    branches: ["master"]
    paths:
      - "ComputerAdminAuth/**"
      - ".github/workflows/computeradminauth.yml"
  pull_request:
    branches: ["master"]
    paths:
      - "ComputerAdminAuth/**"
      - ".github/workflows/computeradminauth.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Images
    runs-on: [self-hosted]
    outputs:
      image-owner: ${{ steps.meta.outputs.owner }}
    steps:
      - name: Cleanup workspace
        run: |
          docker run --rm \
            -e HOST_UID=$(id -u) \
            -e HOST_GID=$(id -g) \
            -v "$PWD":/workspace \
            alpine sh -c "chown -R \"\$HOST_UID\":\"\$HOST_GID\" /workspace || true; find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} \;"

      - uses: actions/checkout@v4

      - name: Prepare metadata
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push test image (unit tests)
        run: |
          docker build \
            --target test \
            -t ghcr.io/${{ steps.meta.outputs.owner }}/computer-admin-auth:${{ github.sha }}-test \
            -f ComputerAdminAuth/Auth.Host/Dockerfile \
            ComputerAdminAuth
          docker push ghcr.io/${{ steps.meta.outputs.owner }}/computer-admin-auth:${{ github.sha }}-test

      - name: Build & push candidate runtime image
        run: |
          docker build \
            --target final \
            -t ghcr.io/${{ steps.meta.outputs.owner }}/computer-admin-auth:${{ github.sha }}-candidate \
            -f ComputerAdminAuth/Auth.Host/Dockerfile \
            ComputerAdminAuth
          docker push ghcr.io/${{ steps.meta.outputs.owner }}/computer-admin-auth:${{ github.sha }}-candidate

  test:
    name: Smoke Test (DB connectivity)
    needs: build
    runs-on: [self-hosted]
    environment: ComputerAdminAuth
    steps:
      - name: Cleanup workspace
        run: |
          docker run --rm \
            -e HOST_UID=$(id -u) \
            -e HOST_GID=$(id -g) \
            -v "$PWD":/workspace \
            alpine sh -c "chown -R \"\$HOST_UID\":\"\$HOST_GID\" /workspace || true; find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} \;"

      - uses: actions/checkout@v4

      - name: Write runtime environment file
        run: |
          if [ -z "${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}" ]; then
            echo "::error::Environment secrets are not configured." >&2
            exit 1
          fi
          cat <<'CONF' > /tmp/computerauthadmin.env
          ASPNETCORE_ENVIRONMENT=${{ secrets.ASPNETCORE_ENVIRONMENT }}
          CONNECTIONSTRINGS__DEFAULTCONNECTION=${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
          TELEGRAM__BOTTOKEN=${{ secrets.TELEGRAM__BOTTOKEN }}
          TELEGRAM__ALLOWEDCLOCKSKEWSECONDS=${{ secrets.TELEGRAM__ALLOWEDCLOCKSKEWSECONDS }}
          OIDC_SVC_REPORTING_SECRET=${{ secrets.OIDC_SVC_REPORTING_SECRET }}
          OIDC_SVC_INTROSPECTOR_SECRET=${{ secrets.OIDC_SVC_INTROSPECTOR_SECRET }}
          OIDC_RESOURCE_SECRET=${{ secrets.OIDC_RESOURCE_SECRET }}
          AUTH_ROOT_PASSWORD=${{ secrets.AUTH_ROOT_PASSWORD }}
          OIDC_SIGNING_CERTIFICATE_PATH=${{ secrets.OIDC_SIGNING_CERTIFICATE_PATH }}
          OIDC_SIGNING_CERTIFICATE_PASSWORD=${{ secrets.OIDC_SIGNING_CERTIFICATE_PASSWORD }}
          DATAPROTECTION__KEYSDIRECTORY=${{ secrets.DATAPROTECTION__KEYSDIRECTORY }}
          CONF
          chmod 600 /tmp/computerauthadmin.env

      - name: Pull test image
        run: docker pull ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}-test

      - name: Run smoke test
        env:
          IMAGE: ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}-test
        run: |
          docker run --rm \
            --network data-network \
            --env-file /tmp/computerauthadmin.env \
            -e SKIP_DB_TESTS=false \
            "$IMAGE" \
            dotnet test Auth.Tests/Auth.Tests.csproj --configuration Release --no-restore --filter "Category=DatabaseConnectivity"

  deploy:
    name: Deploy
    needs: [build, test]
    runs-on: [self-hosted]
    environment: ComputerAdminAuth
    steps:
      - name: Cleanup workspace
        run: |
          docker run --rm \
            -e HOST_UID=$(id -u) \
            -e HOST_GID=$(id -g) \
            -v "$PWD":/workspace \
            alpine sh -c "chown -R \"\$HOST_UID\":\"\$HOST_GID\" /workspace || true; find /workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} \;"

      - uses: actions/checkout@v4

      - name: Write runtime environment file
        run: |
          cat <<'CONF' > /tmp/computerauthadmin.env
          ASPNETCORE_ENVIRONMENT=${{ secrets.ASPNETCORE_ENVIRONMENT }}
          CONNECTIONSTRINGS__DEFAULTCONNECTION=${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
          TELEGRAM__BOTTOKEN=${{ secrets.TELEGRAM__BOTTOKEN }}
          TELEGRAM__ALLOWEDCLOCKSKEWSECONDS=${{ secrets.TELEGRAM__ALLOWEDCLOCKSKEWSECONDS }}
          OIDC_SVC_REPORTING_SECRET=${{ secrets.OIDC_SVC_REPORTING_SECRET }}
          OIDC_SVC_INTROSPECTOR_SECRET=${{ secrets.OIDC_SVC_INTROSPECTOR_SECRET }}
          OIDC_RESOURCE_SECRET=${{ secrets.OIDC_RESOURCE_SECRET }}
          AUTH_ROOT_PASSWORD=${{ secrets.AUTH_ROOT_PASSWORD }}
          OIDC_SIGNING_CERTIFICATE_PATH=${{ secrets.OIDC_SIGNING_CERTIFICATE_PATH }}
          OIDC_SIGNING_CERTIFICATE_PASSWORD=${{ secrets.OIDC_SIGNING_CERTIFICATE_PASSWORD }}
          DATAPROTECTION__KEYSDIRECTORY=${{ secrets.DATAPROTECTION__KEYSDIRECTORY }}
          CONF
          chmod 600 /tmp/computerauthadmin.env

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull candidate image
        run: docker pull ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}-candidate

      - name: Verify runtime startup (5 minutes)
        env:
          IMAGE: ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}-candidate
        run: |
          set -euo pipefail

          container_name="auth-startup-check"
          dp_volume="${container_name}-dataprotection"
          oidc_volume="${container_name}-openiddict"

          cleanup() {
            docker rm -f "$container_name" >/dev/null 2>&1 || true
            docker volume rm "$dp_volume" >/dev/null 2>&1 || true
            docker volume rm "$oidc_volume" >/dev/null 2>&1 || true
          }

          cleanup
          trap cleanup EXIT

          docker volume create "$dp_volume" >/dev/null
          docker volume create "$oidc_volume" >/dev/null

          docker run -d \
            --name "$container_name" \
            --network data-network \
            --env-file /tmp/computerauthadmin.env \
            -v "$dp_volume":/keys/dataprotection \
            -v "$oidc_volume":/keys/openiddict \
            "$IMAGE" >/dev/null

          start_ts=$(date +%s)
          timeout_sec=300

          while true; do
            status=$(docker inspect -f '{{.State.Status}}' "$container_name")
            if [ "$status" != "running" ]; then
              echo "::error::Container exited with status '$status' before ${timeout_sec}s elapsed." >&2
              docker logs "$container_name" || true
              exit 1
            fi

            elapsed=$(( $(date +%s) - start_ts ))
            if [ "$elapsed" -ge "$timeout_sec" ]; then
              break
            fi

            sleep 5
          done

          echo "Container remained healthy for ${timeout_sec}s. Recent logs:"
          docker logs "$container_name" | tail -n 50 || true

      - name: Promote tags
        run: |
          docker tag ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}-candidate ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}
          docker tag ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}-candidate ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:master
          docker push ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}
          docker push ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:master

      - name: Deploy via docker compose
        env:
          AUTH_IMAGE: ghcr.io/${{ needs.build.outputs.image-owner }}/computer-admin-auth:${{ github.sha }}
          AUTH_ENV_FILE: /tmp/computerauthadmin.env
        run: |
          docker compose -f ComputerAdminAuth/docker-compose.yml up -d --no-build auth
