worker_processes auto;

events {}

http {
    # Preserve original scheme even if outer proxy doesn't send X-Forwarded-Proto
    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;

    upstream auth_kestrel_https {
        # Kestrel in the 'auth' service listens on HTTPS 5001 (self-signed)
        server auth:5001;
    }

    server {
        listen 8080;
        server_name _;

        location / {
            proxy_pass https://auth_kestrel_https;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Preserve the original client scheme from the outer proxy (https), fallback to current scheme
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_set_header X-Forwarded-Host $host;

            # Ensure CORS-related headers are forwarded intact to upstream
            proxy_set_header Origin $http_origin;
            proxy_set_header Access-Control-Request-Method $http_access_control_request_method;
            proxy_set_header Access-Control-Request-Headers $http_access_control_request_headers;

            # Kestrel uses an ephemeral self-signed cert; do not verify inside the cluster
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # Hide upstream headers to avoid duplicate/stricter policies
            proxy_hide_header X-Frame-Options;

            # CSP headers are managed by Cloudflare; do not set here
        }
    }
}

