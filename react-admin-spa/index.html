<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Telegram WebApp SDK (опционально, но рекомендуется) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>Admin Panel</title>
    
    <script>
      // Если приложение открыто в Telegram, делаем базовую инициализацию
      if (window.Telegram && window.Telegram.WebApp) {
        try {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          console.log('Telegram WebApp detected and configured');
        } catch (e) {
          console.error('Telegram WebApp init error:', e);
        }
      }
      
      // Логируем информацию для отладки
      console.log('App starting with URL:', window.location.href);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
