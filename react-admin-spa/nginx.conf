server {
    listen       5000;
    listen       [::]:5000;
    server_name  _;

    # Root folder with built SPA
    root   /usr/share/nginx/html;
    index  index.html;

    # Security + allow embedding in Telegram
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # Allow this app to be embedded by Telegram, and allow frames to Telegram domains
    # Only allow this app to be embedded by Telegram (Web)
    add_header Content-Security-Policy "default-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: https://telegram.org https://t.me; style-src 'self' 'unsafe-inline' https:; img-src * data: blob:; font-src 'self' data: https:; connect-src *; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org https://t.me;" always;

    # Serve static files with basic caching
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback to index.html
    location / {
        try_files $uri /index.html;
    }

    # Ensure fresh SW and index on each deploy
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Optional: UI-specific healthcheck (HTTP 200, no body)
    location = /ui-healthz {
        return 200;
    }
}
